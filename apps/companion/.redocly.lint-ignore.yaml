# This file instructs Redocly's linter to ignore the rules contained for specific parts of your API.
# See https://redocly.com/docs/cli/ for more information.
openapi.json:
  no-empty-servers:
    - '#/openapi'
  info-license:
    - '#/info'
  operation-4xx-response:
    - '#/paths/~1health/get/responses'
    - '#/paths/~1profile/get/responses'
    - '#/paths/~1profile/put/responses'
    - '#/paths/~1profile~1resume/put/responses'
    - '#/paths/~1resumes/get/responses'
    - '#/paths/~1resumes~1{id}/delete/responses'
    - '#/paths/~1resumes~1default/delete/responses'
    - '#/paths/~1jobs/get/responses'
    - '#/paths/~1jobs~1{id}/delete/responses'
  struct:
    - '#/components/schemas/CompanionJob/properties/parsedTitle/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/parsedCompany/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/parsedLocation/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/parsedDescription/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/fitScore/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/fitBriefJson/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/crawlError/anyOf/1/type'
    - '#/components/schemas/CompanionJob/properties/crawledAt/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/parsedTitle/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/parsedCompany/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/parsedLocation/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/parsedDescription/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/fitScore/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/fitBriefJson/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/crawlError/anyOf/1/type'
    - '#/components/schemas/CompanionJobInput/properties/crawledAt/anyOf/1/type'
  no-unused-components:
    - '#/components/schemas/HealthResponseInput'
    - '#/components/schemas/ExtractJobRequestInput'
    - '#/components/schemas/JobExtractionResultInput'
    - '#/components/schemas/CompanionErrorResponseInput'
    - '#/components/schemas/JobIdParamsInput'
    - '#/components/schemas/CompanionJobsResponseInput'
    - '#/components/schemas/DeleteJobResponseInput'
    - '#/components/schemas/OkResponseInput'
    - '#/components/schemas/ResumeDetailsInput'
    - '#/components/schemas/ResumesResponseInput'
    - '#/components/schemas/DeleteResumeResponseInput'
    - '#/components/schemas/JobFitBriefInput'
    - '#/components/schemas/ExtractJobRequest'
    - '#/components/schemas/JobExtractionResult'
    - '#/components/schemas/CreateJobRequest'
    - '#/components/schemas/JobIdParams'
    - '#/components/schemas/ResumeSyncRequest'
    - '#/components/schemas/CreateResumeRequest'
    - '#/components/schemas/UpdateResumeRequest'
    - '#/components/schemas/JobFitBrief'
  security-defined:
    - '#/paths/~1health/get'
    - '#/paths/~1profile/get'
    - '#/paths/~1profile/put'
    - '#/paths/~1profile~1resume/get'
    - '#/paths/~1profile~1resume/put'
    - '#/paths/~1resumes/get'
    - '#/paths/~1resumes/post'
    - '#/paths/~1resumes~1{id}/get'
    - '#/paths/~1resumes~1{id}/put'
    - '#/paths/~1resumes~1{id}/delete'
    - '#/paths/~1resumes~1{id}~1default/put'
    - '#/paths/~1resumes~1default/delete'
    - '#/paths/~1jobs/get'
    - '#/paths/~1jobs/post'
    - '#/paths/~1jobs~1{id}/get'
    - '#/paths/~1jobs~1{id}/delete'
    - '#/paths/~1jobs~1{id}~1retry-crawl/post'
